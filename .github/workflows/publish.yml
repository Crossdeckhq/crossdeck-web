name: Publish to npm

# Triggers when you push a git tag matching v* (e.g. v0.1.0, v1.2.3-beta).
# The release pipeline runs the test suite, builds the package, and
# publishes to npm using the NPM_TOKEN secret.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write       # for creating the GitHub Release
  id-token: write       # for npm provenance (optional but recommended)

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
